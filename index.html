<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAlpha Music Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="music-player">
    <div class="cover" id="cover">
        <img src="https://via.placeholder.com/200" id="cover-img" alt="Cover">
    </div>

    <div class="song-info">
        <h2 id="title">Boomrang</h2>
        <p id="artist">Alex</p>
    </div>

    <div class="progress-area" id="progress-area">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="time">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button class="play-pause" onclick="playPause()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <div class="volume">
        🔊 <input type="range" id="volume" min="0" max="1" step="0.1" value="0.7">
    </div>

    <audio id="audio"></audio>
</div>

<script>
    const songs = [
        {
            title: "Boomrang",
            artist: "Alex",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // apna mp3 link yahan dalo
            cover: "alex-g-WnRyw5Rss2o-unsplash.jpg"
        },
        {
            title: "Boxer",
            artist: "Amillie",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            cover: "filip-VHf4jqrUu7g-unsplash.jpg"
        },
        {
            title: "Dooper",
            artist: "Alixia",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
            cover: "eng-hs-oYgvXcRDh4I-unsplash.jpg"
        }
    ];

    let songIndex = 0;
    const audio = document.getElementById('audio');
    const playPauseBtn = document.querySelector('.play-pause');
    const cover = document.getElementById('cover');

    function loadSong(song) {
        document.getElementById('title').innerText = song.title;
        document.getElementById('artist').innerText = song.artist;
        document.getElementById('cover-img').src = song.cover;
        audio.src = song.src;
    }

    function playPause() {
        if(audio.paused) {
            audio.play();
            playPauseBtn.innerText = '⏸';
            cover.classList.add('playing');
        } else {
            audio.pause();
            playPauseBtn.innerText = '▶';
            cover.classList.remove('playing');
        }
    }

    function nextSong() {
        songIndex = (songIndex + 1) % songs.length;
        loadSong(songs[songIndex]);
        audio.play();
        playPauseBtn.innerText = '⏸';
        cover.classList.add('playing');
    }

    function prevSong() {
        songIndex = (songIndex - 1 + songs.length) % songs.length;
        loadSong(songs[songIndex]);
        audio.play();
        playPauseBtn.innerText = '⏸';
        cover.classList.add('playing');
    }

    // Progress bar
    audio.addEventListener('timeupdate', () => {
        const progress = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        let min = Math.floor(audio.currentTime / 60);
        let sec = Math.floor(audio.currentTime % 60);
        document.getElementById('current-time').innerText = `${min}:${sec < 10? '0' + sec : sec}`;
    });

    document.getElementById('progress-area').addEventListener('click', (e) => {
        const width = e.currentTarget.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / width) * audio.duration;
    });

    audio.addEventListener('loadeddata', () => {
        let min = Math.floor(audio.duration / 60);
        let sec = Math.floor(audio.duration % 60);
        document.getElementById('duration').innerText = `${min}:${sec < 10? '0' + sec : sec}`;
    });

    audio.addEventListener('ended', nextSong); // Autoplay next

    // Volume control
    document.getElementById('volume').addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    // Initial load
    loadSong(songs[songIndex]);
</script>

</body>
</html>
